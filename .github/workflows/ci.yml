name: Retail QE CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa-checks:
    runs-on: ubuntu-latest

    env:
      CYPRESS_BASE_URL: http://localhost:3000
      API_BASE_URL: http://localhost:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Verify Cypress installation
        run: npm run cy:verify

      - name: TypeScript check
        run: npm run typecheck

      - name: Check project structure
        run: |
          test -d cypress/e2e
          test -d postman/collections
          test -d sql/validation
          test -d docs
          test -d reports
          echo "Project structure exists."

      # These are commented out because the app, API, and database are local to your Windows machine.
      # GitHub-hosted runners cannot access your local localhost services.

      # - name: Run API tests
      #   run: npm run api:test

      # - name: Run Cypress UI tests
      #   run: npm run cy:run

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: reports/