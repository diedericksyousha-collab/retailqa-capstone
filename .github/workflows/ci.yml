name: Retail QE CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa-checks:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: "Your_password123"
        ports:
          - 1433:1433

    env:
  CYPRESS_BASE_URL: http://localhost:3000
  API_BASE_URL: http://localhost:5000

  ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=LewisStoresDb;User Id=sa;Password=Your_password123;Encrypt=False;TrustServerCertificate=True;"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Backend + Tests
        run: npm run ci:test

      - name: Verify Cypress installation
        run: npm run cy:verify

      - name: TypeScript check
        run: npm run typecheck

      - name: Check project structure
        run: |
          test -d cypress/e2e
          test -d postman/collections
          test -d sql/validation
          test -d docs
          test -d reports
          echo "Project structure exists."

      - name: Run API tests
        run: |
          npm run api:test:collection1
          npm run api:test:collection2

      - name: Run Cypress UI tests
        run: npm run cy:run

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: reports/