services:
  - type: web
    name: lewis-stores-api
    runtime: dotnet
    plan: free
    rootDir: Lewis-Stores/LewisStores.Api
    buildCommand: dotnet restore && dotnet publish -c Release -o out
    startCommand: dotnet out/LewisStores.Api.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: CONNECTION_STRINGS__DEFAULT_CONNECTION
        value: Data Source=/var/data/lewis.db
    disks:
      - name: lewis-data
        mountPath: /var/data
        sizeGB: 1
